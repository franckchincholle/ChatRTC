version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rtc_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password_change_me
      POSTGRES_DB: rtc_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rtc_network

  redis:
    image: redis:7-alpine
    container_name: rtc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - rtc_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rtc_backend
    environment:
      NODE_ENV: production
      PORT: 3001
      CLIENT_URL: http://localhost:3000

      DATABASE_URL: postgresql://postgres:your_password_change_me@postgres:5432/rtc_chat?schema=public
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rtc_chat
      DB_USER: postgres
      DB_PASSWORD: your_password_change_me

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_URL: redis://redis:6379

      JWT_SECRET: your_super_secret_key_change_this_in_production_min_32_chars
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: your_refresh_secret_key_also_change_this_min_32_chars
      JWT_REFRESH_EXPIRES_IN: 30d

      BCRYPT_ROUNDS: 10
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rtc_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rtc_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3001
      BUILD_TARGET: docker
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - rtc_network
    restart: unless-stopped

networks:
  rtc_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: