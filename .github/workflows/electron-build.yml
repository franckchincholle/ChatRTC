name: Electron Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Plateforme Mac à builder"
        required: true
        default: "mac-arm64"
        type: choice
        options:
          - mac-arm64
          - mac-x64
          - mac-all

jobs:
  # ─── Build Linux + Windows (sur tag) ────────────────────────────────────────
  build-linux-windows:
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: windows-latest
            name: windows-x64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    # Permission nécessaire pour créer/modifier une Release
    permissions:
      contents: write

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Electron
        run: npm run electron:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            frontend/release/*.AppImage
            frontend/release/*.exe
          retention-days: 7

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.AppImage
            frontend/release/*.exe
          # draft: true → la release est créée mais pas publiée,
          # tu dois aller la valider manuellement sur GitHub
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Build Mac (sur demande manuelle) ───────────────────────────────────────
  build-mac:
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            name: mac-x64
            enabled: ${{ github.event.inputs.platform == 'mac-x64' || github.event.inputs.platform == 'mac-all' }}
          - os: macos-latest
            name: mac-arm64
            enabled: ${{ github.event.inputs.platform == 'mac-arm64' || github.event.inputs.platform == 'mac-all' }}

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    permissions:
      contents: write

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Electron
        run: npm run electron:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            frontend/release/*.dmg
            frontend/release/*.zip
          retention-days: 7

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.dmg
            frontend/release/*.zip
          draft: true
          tag_name: ${{ github.ref_name || 'manual' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}