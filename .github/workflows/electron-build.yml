name: Electron Build

on:
  push:
    tags:
      - 'v*'   # se déclenche sur git tag v1.0.0 puis git push origin v1.0.0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            name: linux-x64
          - os: windows-latest
            arch: x64
            name: windows-x64
          - os: macos-13
            arch: x64
            name: mac-x64
          - os: macos-latest
            arch: arm64
            name: mac-arm64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Electron
        run: npm run electron:build
        env:
          # Nécessaire pour electron-builder sur Linux
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/*.exe
            frontend/release/*.dmg
            frontend/release/*.zip
          retention-days: 7